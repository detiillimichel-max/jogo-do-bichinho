<!DOCTYPE html>
<html lang="pt-BR">
<head><style>
@font-face {
  font-family: "Optimistic";
  font-style: normal;
  font-weight: 400 600;
  font-display: swap;
  src: url("/fonts/OptimisticAI_VF_Optimized.woff2") format("woff2");
}
@font-face {
  font-family: "Optimistic Mono";
  font-style: normal;
  font-weight: 400;
  font-display: swap;
  src: url("/fonts/OptimisticMono_W_TextRegular.woff2") format("woff2");
}
:where(html) {
  font-family: "Optimistic", system-ui, sans-serif;
}
:where(code, pre, kbd, samp) {
  font-family: "Optimistic Mono", ui-monospace, monospace;
}
</style>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Jogo do Bichinho - Toque Mágico</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; width:100%; overflow:hidden; overscroll-behavior:none; position:fixed; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, "Helvetica Neue", Arial, sans-serif;
    background:#6a11cb;
    color:#fff;
    user-select:none;
    -webkit-user-select:none;
    touch-action:none;
  }
  #game {
    position:fixed; inset:0;
    background: linear-gradient(135deg, #6a11cb 0%, #7b2aeb 35%, #a855f7 60%, #2575fc 100%);
    overflow:hidden;
    touch-action:none;
  }
  #game::before {
    content:"";
    position:absolute; inset:-20%;
    background:
      radial-gradient(600px circle at 20% 20%, rgba(255,255,255,0.15), transparent 60%),
      radial-gradient(500px circle at 80% 30%, rgba(255,180,255,0.12), transparent 60%),
      radial-gradient(700px circle at 50% 80%, rgba(120,180,255,0.15), transparent 60%);
    pointer-events:none;
  }
  #bg-canvas, #particle-canvas {
    position:absolute; inset:0; width:100%; height:100%; pointer-events:none;
  }
  #world { position:absolute; inset:0; z-index:2; }
  
  #ui-top {
    position:absolute; top:env(safe-area-inset-top,0); left:0; right:0;
    padding:14px 14px; display:flex; gap:8px; align-items:center; justify-content:space-between;
    z-index:20; pointer-events:none;
  }
  #score {
    pointer-events:auto;
    background:rgba(255,255,255,0.18);
    backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,0.28);
    padding:10px 18px; border-radius:999px;
    font-weight:800; font-size:18px; letter-spacing:0.3px;
    box-shadow:0 8px 24px rgba(0,0,0,0.18), inset 0 1px 0 rgba(255,255,255,0.2);
    text-shadow:0 1px 2px rgba(0,0,0,0.2);
  }
  .ui-btns { display:flex; gap:8px; pointer-events:auto; }
  button {
    background:rgba(255,255,255,0.16);
    border:1px solid rgba(255,255,255,0.28);
    color:white; font-weight:700; font-size:14px;
    padding:10px 14px; border-radius:14px;
    backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    box-shadow:0 6px 18px rgba(0,0,0,0.18);
    cursor:pointer; transition:transform 0.1s ease, background 0.2s;
  }
  button:active { transform:scale(0.95); background:rgba(255,255,255,0.25); }

  #hint {
    position:absolute; bottom:28px; left:50%; transform:translateX(-50%);
    background:rgba(0,0,0,0.28); padding:9px 16px; border-radius:999px;
    font-size:14px; font-weight:600; letter-spacing:0.2px;
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
    border:1px solid rgba(255,255,255,0.15);
    z-index:15; transition:opacity 0.4s; pointer-events:none;
    box-shadow:0 4px 16px rgba(0,0,0,0.2);
  }

  .creature {
    position:absolute; left:0; top:0; width:96px; height:96px;
    display:flex; align-items:center; justify-content:center;
    font-size:64px; line-height:1;
    will-change:transform; cursor:pointer;
    filter:drop-shadow(0 10px 18px rgba(0,0,0,0.35)) drop-shadow(0 2px 4px rgba(0,0,0,0.25));
    transition:transform 0.15s ease-out;
    z-index:5;
  }
  .creature > span {
    display:block; animation:float 2.2s ease-in-out infinite;
    transform-origin:center;
  }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
  .creature.hit > span { animation:none; transform:scale(1.35); transition:transform 0.15s; }
  .creature.spin > span { animation:spinpop 0.7s cubic-bezier(.2,.8,.2,1); }
  @keyframes spinpop { 0%{transform:rotate(0) scale(1)} 50%{transform:rotate(360deg) scale(1.5)} 100%{transform:rotate(720deg) scale(1)} }
  .creature.flap > span { animation:flap 0.5s ease-in-out 2; }
  @keyframes flap { 0%,100%{transform:scaleY(1) scaleX(1)} 30%{transform:scaleY(0.55) scaleX(1.3)} 60%{transform:scaleY(1.1) scaleX(0.9)} }
  .creature.run > span { animation:shake 0.28s linear 3; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px) rotate(-5deg)} 75%{transform:translateX(5px) rotate(5deg)} }

  .ripple {
    position:absolute; width:20px; height:20px; margin:-10px 0 0 -10px;
    border-radius:50%; border:2px solid rgba(255,255,255,0.7);
    pointer-events:none; z-index:4; animation:ripple 0.6s ease-out forwards;
  }
  @keyframes ripple { to{transform:scale(8); opacity:0} }

  /* Start Screen */
  #start-screen {
    position:fixed; inset:0; z-index:100;
    display:flex; align-items:center; justify-content:center;
    background:rgba(20,5,40,0.72); backdrop-filter:blur(22px); -webkit-backdrop-filter:blur(22px);
    padding:20px;
  }
  .card {
    width:100%; max-width:440px;
    background:linear-gradient(180deg, rgba(255,255,255,0.18), rgba(255,255,255,0.07));
    border:1px solid rgba(255,255,255,0.28);
    border-radius:28px; padding:26px 22px 24px;
    box-shadow:0 24px 70px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.2);
    text-align:center;
  }
  .card h1 { font-size:32px; font-weight:900; letter-spacing:-0.5px; margin-bottom:4px; text-shadow:0 2px 10px rgba(0,0,0,0.25); }
  .card .sub { opacity:0.9; font-weight:600; margin-bottom:14px; color:#ffe8ff; }
  .instr {
    background:rgba(0,0,0,0.25); border:1px solid rgba(255,255,255,0.15);
    padding:11px 14px; border-radius:14px; font-size:14px; line-height:1.35; margin:14px 0 18px;
  }
  .card h2 { font-size:17px; margin:18px 0 12px; opacity:0.95; }
  .chars {
    display:grid; grid-template-columns:repeat(3,1fr); gap:12px;
  }
  @media (max-width:390px){ .chars{grid-template-columns:repeat(2,1fr);} .creature{width:86px;height:86px;font-size:58px;} }
  .char-btn {
    background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.22);
    border-radius:20px; padding:16px 8px; cursor:pointer;
    transition:transform 0.15s, background 0.2s; display:flex; flex-direction:column; align-items:center; gap:6px;
  }
  .char-btn:active, .char-btn:hover { background:rgba(255,255,255,0.22); transform:translateY(-2px) scale(1.02); }
  .char-btn .emoji { font-size:46px; filter:drop-shadow(0 6px 10px rgba(0,0,0,0.3)); }
  .char-btn span { font-weight:700; font-size:13px; opacity:0.95; }

  /* Cat Mode */
  body.cat-mode #ui-top .ui-btns { opacity:0; pointer-events:none; transform:translateY(-10px); transition:all 0.3s; }
  body.cat-mode #hint { opacity:0 !important; }
  body.cat-mode #score { font-size:15px; padding:7px 12px; background:rgba(0,0,0,0.25); }
  body.cat-mode .creature { width:108px; height:108px; font-size:72px; }
</style>
</head>
<body>
<div id="game">
  <canvas id="bg-canvas"></canvas>
  <div id="world"></div>
  <canvas id="particle-canvas"></canvas>
  
  <div id="ui-top">
    <div id="score">Toques: 0</div>
    <div class="ui-btns">
      <button id="cat-mode">🐱 Modo Gato</button>
      <button id="restart">Reiniciar</button>
    </div>
  </div>
  <div id="hint">Toque na tela!</div>
</div>

<div id="start-screen">
  <div class="card">
    <h1>Jogo do Bichinho ✨</h1>
    <div class="sub">Toque Mágico</div>
    <div class="instr">Igual ao vídeo do gatinho - toque e veja a mágica acontecer!</div>
    <h2>Escolha seu bichinho</h2>
    <div class="chars">
      <button class="char-btn" data-char="peixinho"><div class="emoji">🐟</div><span>Peixinho</span></button>
      <button class="char-btn" data-char="ratinho"><div class="emoji">🐭</div><span>Ratinho</span></button>
      <button class="char-btn" data-char="joaninha"><div class="emoji">🐞</div><span>Joaninha</span></button>
      <button class="char-btn" data-char="borboleta"><div class="emoji">🦋</div><span>Borboleta</span></button>
      <button class="char-btn" data-char="polvo"><div class="emoji">🐙</div><span>Polvinho</span></button>
    </div>
  </div>
</div>

<script>
(() => {
  const game = document.getElementById('game');
  const world = document.getElementById('world');
  const scoreEl = document.getElementById('score');
  const catBtn = document.getElementById('cat-mode');
  const restartBtn = document.getElementById('restart');
  const hint = document.getElementById('hint');
  const startScreen = document.getElementById('start-screen');
  
  const bgCanvas = document.getElementById('bg-canvas');
  const bgCtx = bgCanvas.getContext('2d');
  const pCanvas = document.getElementById('particle-canvas');
  const pCtx = pCanvas.getContext('2d');
  
  let W = innerWidth, H = innerHeight;
  function resize() {
    W = innerWidth; H = innerHeight;
    [bgCanvas, pCanvas].forEach(c => { c.width = W; c.height = H; });
    initStars();
  }
  window.addEventListener('resize', resize);
  resize();

  // Audio
  let audioCtx;
  function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }
  function tone(a,b,d,type='sine',v=0.22) {
    initAudio();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type; o.frequency.setValueAtTime(a, audioCtx.currentTime);
    o.frequency.exponentialRampToValueAtTime(b, audioCtx.currentTime + d);
    g.gain.setValueAtTime(v, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + d);
    o.connect(g).connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + d + 0.02);
  }
  const sounds = {
    pop: () => tone(520,880,0.09,'sine',0.25),
    peixinho: () => tone(220,380,0.22,'sine',0.26),
    ratinho: () => tone(900,1400,0.11,'square',0.18),
    joaninha: () => tone(600,820,0.16,'triangle',0.22),
    borboleta: () => tone(700,1050,0.24,'sine',0.2),
    polvo: () => tone(150,260,0.32,'sawtooth',0.24),
  };

  const chars = {
    peixinho: { emoji:'🐟', name:'Peixinho', react: c => { c.speedBoost=1.8; for(let i=0;i<6;i++) addParticle(c.x+48,c.y+48,'bubble'); } },
    ratinho: { emoji:'🐭', name:'Ratinho', react: c => { c.element.classList.add('run'); setTimeout(()=>c.element.classList.remove('run'),350); c.vx*=2.5; c.vy*=2.5; } },
    joaninha: { emoji:'🐞', name:'Joaninha', react: c => { c.element.classList.add('spin'); setTimeout(()=>c.element.classList.remove('spin'),750); c.vy -= 4; } },
    borboleta: { emoji:'🦋', name:'Borboleta', react: c => { c.element.classList.add('flap'); setTimeout(()=>c.element.classList.remove('flap'),550); c.vy -= 2; } },
    polvo: { emoji:'🐙', name:'Polvinho', react: c => { for(let i=0;i<28;i++) addParticle(c.x+48,c.y+48,'ink'); } },
  };

  let creatures = [];
  let particles = [];
  let score = 0;
  let speedMul = 1;
  let catMode = false;
  let lastTouch = null;
  let gameStarted = false;
  let firstHint = true;

  // Stars background
  let stars = [];
  function initStars() {
    stars = Array.from({length:140}, () => ({
      x: Math.random()*W, y: Math.random()*H,
      s: Math.random()*1.8 + 0.4,
      p: Math.random()*Math.PI*2
    }));
  }
  initStars();

  function spawn(type, center=false) {
    const el = document.createElement('div');
    el.className = 'creature';
    el.innerHTML = `<span>${chars[type].emoji}</span>`;
    world.appendChild(el);
    const c = {
      type, el, x:W/2, y:H/2, vx:(Math.random()-0.5)*2, vy:(Math.random()-0.5)*2,
      speedBoost:0, element:el
    };
    if (!center) { c.x = Math.random()*(W-100)+10; c.y = Math.random()*(H-180)+90; }
    el.addEventListener('pointerdown', e => e.preventDefault());
    creatures.push(c);
    return c;
  }

  function updateScore() { scoreEl.textContent = `Toques: ${score}`; }

  function addParticle(x,y,kind='star', color=null) {
    const cols = {
      star:['#FFDE59','#FFF7B0','#FF9FF3','#FFFFFF','#A78BFA'],
      ink:['#4c1d95','#6d28d9','#7c3aed','#2e1065'],
      bubble:['#7dd3fc','#38bdf8','#e0f2fe'],
    };
    const pal = cols[kind] || cols.star;
    const col = color || pal[Math.floor(Math.random()*pal.length)];
    particles.push({
      x, y,
      vx:(Math.random()-0.5)*(kind==='ink'?6:9),
      vy:(Math.random()-0.5)*(kind==='ink'?6:9) - (kind==='bubble'?2:1.5),
      life: kind==='ink'?70: kind==='bubble'?55: 45+Math.random()*15,
      size: kind==='ink'? Math.random()*7+4 : kind==='bubble'? Math.random()*5+3 : Math.random()*4+3,
      color:col, kind, rot:Math.random()*Math.PI, vr:(Math.random()-0.5)*0.2
    });
  }

  function explosion(x,y,type) {
    const map = {peixinho:'star', ratinho:'star', joaninha:'star', borboleta:'star', polvo:'ink'};
    const kind = map[type] || 'star';
    const count = type==='polvo'? 18 : 22;
    for(let i=0;i<count;i++) addParticle(x,y,kind);
    // extra sparkles
    for(let i=0;i<8;i++) addParticle(x,y,'star','#FFDE59');
  }

  function hitCreature(c) {
    score++; updateScore();
    sounds.pop(); sounds[c.type]();
    if (navigator.vibrate) navigator.vibrate(12);
    c.element.classList.add('hit'); setTimeout(()=>c.element.classList.remove('hit'),170);
    explosion(c.x+48, c.y+48, c.type);
    chars[c.type].react(c);
    c.vx += (Math.random()-0.5)*5; c.vy += (Math.random()-0.5)*5;
    if (firstHint) { firstHint=false; hint.style.opacity='0'; }
  }

  function createRipple(x,y) {
    const r = document.createElement('div');
    r.className='ripple'; r.style.left=x+'px'; r.style.top=y+'px';
    world.appendChild(r); setTimeout(()=>r.remove(),600);
  }

  // Input
  game.addEventListener('pointerdown', e => {
    if (!gameStarted) return;
    e.preventDefault();
    initAudio();
    const x = e.clientX, y = e.clientY;
    lastTouch = {x, y, t:Date.now()};
    let hit=false;
    for(const c of creatures) {
      const cx = c.x+48, cy = c.y+48;
      const d = Math.hypot(x-cx, y-cy);
      if (d < 60) { hitCreature(c); hit=true; break; }
    }
    if(!hit) createRipple(x,y);
  }, {passive:false});
  game.addEventListener('pointermove', e => {
    if (lastTouch) lastTouch = {x:e.clientX, y:e.clientY, t:Date.now()};
  });
  ['touchmove','gesturestart'].forEach(ev => document.addEventListener(ev, e=>e.preventDefault(), {passive:false}));
  document.addEventListener('contextmenu', e=>e.preventDefault());

  // Game loop
  function loop(t) {
    // bg stars
    bgCtx.clearRect(0,0,W,H);
    for(const s of stars) {
      const a = 0.4 + 0.55*Math.sin(t*0.0015 + s.p);
      bgCtx.globalAlpha = a;
      bgCtx.fillStyle = '#fff';
      bgCtx.shadowColor = 'rgba(200,180,255,0.8)';
      bgCtx.shadowBlur = 8;
      bgCtx.beginPath(); bgCtx.arc(s.x, s.y, s.s, 0, Math.PI*2); bgCtx.fill();
    }
    bgCtx.shadowBlur=0;

    // creatures
    const fleeRadius = catMode?220:180;
    for(const c of creatures) {
      // flee
      if (lastTouch && Date.now()-lastTouch.t < 380) {
        const dx = (c.x+48)-lastTouch.x, dy = (c.y+48)-lastTouch.y;
        const d = Math.hypot(dx,dy);
        if (d < fleeRadius && d>0.1) {
          const f = (fleeRadius-d)/fleeRadius * 3.2 * speedMul;
          c.vx += (dx/d)*f; c.vy += (dy/d)*f;
        }
      }
      // wander
      c.vx += (Math.random()-0.5)*0.35;
      c.vy += (Math.random()-0.5)*0.35;
      if (c.speedBoost>0) c.speedBoost -= 0.03;
      const base = 1.35 * speedMul * (1 + c.speedBoost*0.6);
      const sp = Math.hypot(c.vx,c.vy);
      if (sp > base) { c.vx = c.vx/sp*base; c.vy = c.vy/sp*base; }
      c.vx *= 0.97; c.vy *= 0.97;
      c.x += c.vx; c.y += c.vy;
      // bounds
      const mr = catMode?108:96;
      if (c.x < 0) {c.x=0; c.vx*=-0.8} if (c.x > W-mr) {c.x=W-mr; c.vx*=-0.8}
      if (c.y < 80) {c.y=80; c.vy*=-0.8} if (c.y > H-mr-10) {c.y=H-mr-10; c.vy*=-0.8}
      const rot = Math.atan2(c.vy,c.vx)*0.12*180/Math.PI;
      c.el.style.transform = `translate3d(${c.x}px,${c.y}px,0) rotate(${rot}deg)`;
    }

    // particles
    pCtx.clearRect(0,0,W,H);
    particles = particles.filter(p => p.life>0);
    for(const p of particles) {
      p.life--; p.x+=p.vx; p.y+=p.vy; p.vy += p.kind==='bubble'? -0.03 : 0.07; p.vx*=0.985; p.rot+=p.vr;
      pCtx.globalAlpha = Math.max(p.life/60,0);
      if (p.kind==='star') {
        drawStar(pCtx,p.x,p.y,5,p.size*0.5,p.size,p.rot,p.color);
      } else if (p.kind==='ink') {
        pCtx.fillStyle=p.color; pCtx.beginPath(); pCtx.arc(p.x,p.y,p.size,0,Math.PI*2); pCtx.fill();
      } else { // bubble
        pCtx.strokeStyle=p.color; pCtx.lineWidth=2; pCtx.globalAlpha*=0.8;
        pCtx.beginPath(); pCtx.arc(p.x,p.y,p.size,0,Math.PI*2); pCtx.stroke();
        pCtx.fillStyle='rgba(255,255,255,0.15)'; pCtx.fill();
      }
    }
    pCtx.globalAlpha=1;

    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  function drawStar(ctx,x,y,spikes,inner,outer,rot,color) {
    ctx.save(); ctx.translate(x,y); ctx.rotate(rot);
    ctx.fillStyle=color; ctx.shadowColor=color; ctx.shadowBlur=12;
    ctx.beginPath();
    for(let i=0;i<spikes*2;i++){
      const r = i%2===0?outer:inner;
      const a = i*Math.PI/spikes;
      ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
    }
    ctx.closePath(); ctx.fill(); ctx.restore(); ctx.shadowBlur=0;
  }

  // Start
  document.querySelectorAll('.char-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const type = btn.dataset.char;
      startScreen.style.display='none';
      gameStarted=true; score=0; updateScore();
      creatures.forEach(c=>c.el.remove()); creatures=[];
      spawn(type,true);
      if(catMode) addCats();
      hint.style.opacity='0.9'; firstHint=true; setTimeout(()=>{if(firstHint)hint.style.opacity='0.7';},2000);
    });
  });

  function addCats() {
    const types = Object.keys(chars);
    while(creatures.length < 7) {
      spawn(types[Math.floor(Math.random()*types.length)]);
    }
  }

  catBtn.addEventListener('click', ()=>{
    catMode=!catMode;
    document.body.classList.toggle('cat-mode', catMode);
    if(catMode){
      speedMul=2.3; catBtn.textContent='✖️ Sair';
      if(gameStarted) addCats();
      sounds.pop();
    } else {
      speedMul=1; catBtn.textContent='🐱 Modo Gato';
      // keep one
      while(creatures.length>1){ const c=creatures.pop(); c.el.remove(); }
    }
  });

  restartBtn.addEventListener('click', ()=>{
    gameStarted=false; creatures.forEach(c=>c.el.remove()); creatures=[];
    particles=[]; score=0; updateScore(); catMode=false; speedMul=1;
    document.body.classList.remove('cat-mode'); catBtn.textContent='🐱 Modo Gato';
    startScreen.style.display='flex'; hint.style.opacity='1'; firstHint=true;
  });

  // Prevent double-tap zoom iOS
  let lastTouchEnd=0;
  document.addEventListener('touchend', e=>{ const now=Date.now(); if(now-lastTouchEnd<=300) e.preventDefault(); lastTouchEnd=now; }, {passive:false});
})();
</script>
